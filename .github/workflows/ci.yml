name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saf
          POSTGRES_PASSWORD: saf
          POSTGRES_DB: saf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U saf"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://saf:saf@localhost:5432/saf_test"
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://saf:saf@localhost:5432/saf_test"
          CELERY_BROKER_URL: "redis://localhost:6379/1"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
          APP_SECRET_KEY: "ci-test-secret"
          OCR_PROVIDER: "MOCK"
          S3_ENDPOINT_URL: ""
          S3_ACCESS_KEY: "test"
          S3_SECRET_KEY: "test"
          S3_BUCKET: "test"
          S3_REGION: "eu-west-3"
          S3_USE_PATH_STYLE: "true"
        run: pytest -v --tb=short

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx next lint --max-warnings 0

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
